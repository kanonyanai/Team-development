<!--pc用とスマホ用に切り替えるボタンを付ける！-->

<script src="jquery-3.6.1.min.js"></script>
<!DOCTYPE html>
<html lang="ja">

<form method="post" action="" method="get">

  <head>
    <meta charset="UTF-8">
    <title>ベビーカー・車椅子地図マップ</title>
    
    <!--polyfillのインストール-->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=default"></script>
    <!--jsファイルの読み込み-->
    <script src="./index.js"></script>


    <div class="h11">
      <h1>バリアフリーマップ</h1>
    </div>

    <div class="h22">
      <h2>ベビーカー・車いす利用者の不安を解消！</h2>
    </div>

  </head>

  <body>
    <div>
      <button type="button" onclick="location.href='../Babycar_home/Babycar_pc.html'" class="change_pc">PC用</button>
    </div>


    <!--inputの内容追加-->
    <input 
      id="pac-input" 
      class="controls" 
      type="text" 
      placeholder="Search Box" 
    />


    <!--必ず入れる。idの名前は変えない！！！-->

    <div>
      <p id="start">出発地</p>
      <input type="text" id="startword" placeholder="出発地を入力">
      <button type="submit" id="startconfirm">確定</button>
      <button type="reset" id="startclear">クリア</button>
    </div>

    <div>
      <p id="end">目的地</p>
      <input type="text" id="endword" placeholder="目的地を入力">
      <button type="submit" id="endconfirm">確定</button>
      <button type="reset" id="endclear">クリア</button>
    </div>

    <!--ここまで-->



    <div>
      <input type="submit" id="submit" value="検索">
    </div>

    <div>
      <input type="text" id="search" placeholder="施設名を入力">
    </div>

    <div>
      <input type="button" onclick="location.href='../opinion/opinion.html'" value="ご意見はこちらへ">
    </div>

  </body>


  <div id="map"></div>
  <script type="text/javascript">
    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        zoom: 15,
        center: { lat: 38.260247, lng: 140.879723 },
        mapId: '39f262e385f01678'
      });
    }
  </script>
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD_Gakxu8FkBHY5fuXiJWq7smmLFXjUctg&callback=initAutocomplete&libraries=places&v=weekly">
    </script>



  <link rel="stylesheet" href="Babycar_pc.css">

  <!--phoneの仮のcss指定-->
  <!--<link rel="stylesheet" href="Babycar_phone.css">-->

</form>

</html>
